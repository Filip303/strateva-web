name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build, e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Clean install from lockfile
        run: npm ci

      - name: Audit dependencies (high and above)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Verify production bundle
        run: npm run verify:dist

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

  # Hosting regression: build the Railway/Caddy image with a fake,
  # unresolvable API origin and verify the full serving contract (routing,
  # security headers, caching, HSTS gating, fail-fast build validation) on
  # loopback. No external service is contacted and no secret is needed.
  # This verifies only — it never deploys anything.
  container-smoke:
    name: Container build and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc

      - name: Build image and run container smoke test
        run: node scripts/container-smoke.mjs

  # Portability regression: the build + dist verification must also work on
  # Windows (native paths via fileURLToPath). Playwright is not re-run here.
  verify-dist-windows:
    name: Build and verify dist on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Clean install from lockfile
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Verify production bundle
        run: npm run verify:dist
