# Railway service configuration — build and health-check behaviour only.
#
# Deliberately contains NO domains, NO secrets, NO project/service IDs and
# NO variable values. Railway injects PORT at runtime; the public
# VITE_API_URL build argument is provided as a service variable in Railway
# itself, never committed here. Nothing in this file deploys anything.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
